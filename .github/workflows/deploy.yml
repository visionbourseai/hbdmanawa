name: Deploy to GitHub Pages

on:
  push:
    branches: 'main'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # This line unzips your file automatically on the server
      - name: Unzip project files
        run: |
          ZIP_FILE=$(ls *.zip | head -n 1)
          if [ -n "$ZIP_FILE" ]; then
            unzip -o "$ZIP_FILE" -d ./temp_extracted
            # If the zip created a subfolder, move its contents out to the root
            if [ -d "./temp_extracted/src" ]; then
              cp -r ./temp_extracted/* .
            else
              SUBFOLDER=$(find ./temp_extracted -maxdepth 1 -mindepth 1 -type d | head -n 1)
              cp -r $SUBFOLDER/* .
            fi
            rm -rf temp_extracted
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
